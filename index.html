<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA IPTV BD LIVE</title>
    <!-- Font Awesome CSS (Reliable CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Hls.js -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0e14; color: #ffffff; overflow: hidden; }
        .app-container { display: flex; width: 100vw; height: 100vh; }
        
        .sidebar { width: 240px; background-color: #000000; padding: 20px 15px; display: flex; flex-direction: column; justify-content: space-between; border-right: 1px solid #1a1a1a; position: fixed; height: 100vh; z-index: 100; }
        
        .logo-section h1 { font-size: 16px; color: #ffffff; margin-bottom: 25px; font-weight: 700; }
        .logo-section h1 span { color: #ff0022; display: inline-block; }
        
        .nav-menu { display: flex; flex-direction: column; gap: 6px; flex-grow: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 12px; color: #b3b3b3; text-decoration: none; padding: 10px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background-color: #ff0022; color: #ffffff; }
        
        .social-links { display: flex; gap: 15px; justify-content: center; padding-top: 15px; border-top: 1px solid #111; }
        .social-links a { color: #b3b3b3; font-size: 18px; text-decoration: none; }
        .social-links a:hover { color: #ff0022; }
        
        .main-content { margin-left: 240px; flex-grow: 1; padding: 20px 30px; width: calc(100% - 240px); height: 100vh; display: flex; flex-direction: column; }
        .video-wrapper { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .search-box input { background: #161a22; border: 1px solid #2a2f3b; padding: 8px; border-radius: 6px; color: #fff; width: 250px; }
        
        .channels-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; overflow-y: auto; padding-right: 10px; }
        .channel-card { background: #161a22; border: 1px solid #2a2f3b; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .channel-card:hover { border-color: #ff0022; }
        
        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px 5px; }
            .nav-item span { display: none; }
            .main-content { margin-left: 70px; width: calc(100% - 70px); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-section"><h1>SA IPTV <br><span>BD LIVE</span></h1></div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active"><i class="fa-solid fa-tv"></i> <span>LIVE TV</span></a>
                <a href="#" class="nav-item"><i class="fa-solid fa-heart"></i> <span>FAVORITES</span></a>
                <a href="#" class="nav-item"><i class="fa-solid fa-film"></i> <span>MOVIES</span></a>
                <a href="#" class="nav-item"><i class="fa-solid fa-clapperboard"></i> <span>SERIES</span></a>
                <a href="#" class="nav-item"><i class="fa-solid fa-trophy"></i> <span>SPORTS</span></a>
                <a href="#" class="nav-item"><i class="fa-solid fa-child"></i> <span>KIDS</span></a>
                <a href="#" class="nav-item"><i class="fa-solid fa-radio"></i> <span>RADIO</span></a>
                <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> <span>SETTINGS</span></a>
            </nav>
            <div class="social-links">
                <a href="https://www.facebook.com/ahmed.bd.fb" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://telegram.org" target="_blank"><i class="fa-brands fa-telegram"></i></a>
                <a href="https://youtube.com" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </aside>

        <main class="main-content">
            <section class="video-wrapper">
                <video id="video" controls autoplay playsinline></video>
            </section>
            <br>
            <div class="cat-header">
                <h3>Channels</h3>
                <div class="search-box"><input type="text" id="search" placeholder="Search..." oninput="filterChannels()"></div>
            </div>
            <div class="channels-grid" id="channels-container"></div>
        </main>
    </div>

    <script>
        const m3uUrl = "https://raw.githubusercontent.com/abusaeeidx/Mrgify-BDIX-IPTV/main/playlist.m3u";
        let allChannels = [];
        const video = document.getElementById('video');
        let hlsPlayer = null;

        async function loadData() {
            const res = await fetch(m3uUrl);
            const text = await res.text();
            parseM3U(text);
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    allChannels.push({name, url});
                }
            }
            renderChannels(allChannels);
            if(allChannels.length > 0) play(allChannels[0].url);
        }

        function renderChannels(list) {
            const container = document.getElementById('channels-container');
            container.innerHTML = list.map((ch, idx) => `
                <div class="channel-card" onclick="play('${ch.url}')">
                    <i class="fa-solid fa-play" style="color:#ff0022"></i>
                    <div>${ch.name}</div>
                </div>
            `).join('');
        }

        function play(url) {
            video.muted = false; // অটো সাউন্ডের জন্য
            if (hlsPlayer) hlsPlayer.destroy();
            hlsPlayer = new Hls();
            hlsPlayer.loadSource(url);
            hlsPlayer.attachMedia(video);
            video.play();
        }

        function filterChannels() {
            const val = document.getElementById('search').value.toLowerCase();
            renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(val)));
        }

        loadData();
    </script>
</body>
</html>
