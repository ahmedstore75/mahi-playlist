<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA IPTV BD LIVE</title>
    <link class="cdn-link" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* মেইন গ্লোবাল রুলস */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            overflow: hidden; 
        }

        .app-container {
            display: flex;
            width: 100vw;
            height: 100vh; 
        }

        /* ফিক্সড বাম পাশের সাইডবার */
        .sidebar {
            width: 240px;
            background-color: #000000;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid #1a1a1a;
            position: fixed;
            height: 100vh;
            z-index: 100;
            flex-shrink: 0;
        }

        .logo-section h1 {
            font-size: 16px;
            color: #ffffff;
            margin-bottom: 20px;
            font-weight: 700;
            line-height: 1.3;
        }
        .logo-section h1 span {
            color: #ff0022;
            display: inline-block;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .nav-menu::-webkit-scrollbar { width: 4px; }
        .nav-menu::-webkit-scrollbar-thumb { background: #2a2f3b; border-radius: 2px; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #b3b3b3;
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
            white-space: nowrap;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 15px;
            width: 20px;
        }

        .nav-item:hover, .nav-item.active {
            background-color: #ff0022;
            color: #ffffff;
        }

        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            padding-top: 15px;
            border-top: 1px solid #111;
            flex-shrink: 0;
        }

        .social-links a {
            color: #b3b3b3;
            font-size: 16px;
            transition: 0.3s;
            text-decoration: none;
        }

        .social-links a:hover {
            color: #ff0022;
        }

        /* ডান পাশের মেইন কন্টেন্ট এরিয়া */
        .main-content {
            margin-left: 240px;
            flex-grow: 1;
            padding: 20px 30px;
            width: calc(100% - 240px);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .top-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .time-widget {
            text-align: right;
            font-size: 16px;
            color: #ffffff;
            font-weight: bold;
        }

        .time-widget span {
            font-size: 12px;
            color: #888;
        }

        /* ভিডিও প্লেয়ার */
        .player-container {
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2f3b;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-overlay-top {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .score-badge {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ff0022;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff0022;
            border-radius: 50%;
            animation: blink 1s infinite;
            flex-shrink: 0;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* স্ক্রলেবল কন্টেন্ট এরিয়া */
        .scrollable-content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .scrollable-content-area::-webkit-scrollbar { width: 6px; }
        .scrollable-content-area::-webkit-scrollbar-thumb { background: #ff0022; border-radius: 3px; }

        /* ক্যাটাগরি সেকশন (Sticky) */
        .category-section {
            position: sticky;
            top: 0;
            background-color: #0b0e14;
            z-index: 50;
            padding-top: 5px;
            padding-bottom: 10px;
        }

        .cat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 15px;
        }

        .search-box {
            position: relative;
            width: 250px;
            flex-shrink: 0;
        }

        .search-box input {
            width: 100%;
            background-color: #161a22;
            border: 1px solid #2a2f3b;
            padding: 8px 35px 8px 12px;
            border-radius: 6px;
            color: #fff;
            outline: none;
        }

        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .category-tags {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .category-tags::-webkit-scrollbar { height: 4px; }
        .category-tags::-webkit-scrollbar-thumb { background: #2a2f3b; border-radius: 2px; }

        .cat-btn {
            background-color: #161a22;
            color: #b3b3b3;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }

        .cat-btn.active, .cat-btn:hover {
            background-color: #ff0022;
            color: #fff;
        }

        /* চ্যানেল গ্রিড */
        .channels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .channel-card {
            background-color: #161a22;
            border: 1px solid #2a2f3b;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            overflow: hidden;
            position: relative;
        }

        .channel-card:hover {
            background-color: #1e2330;
            border-color: #ff0022;
        }

        .channel-card.currently-playing {
            border-color: #ff0022;
            background-color: #1e1115;
        }

        .channel-thumb {
            width: 50px;
            height: 38px;
            object-fit: contain;
            background-color: #0b0e14;
            border-radius: 4px;
            border: 1px solid #2a2f3b;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff0022;
        }

        .channel-info {
            flex-grow: 1;
            overflow: hidden;
        }

        .channel-info h4 {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-name {
            font-size: 11px;
            font-weight: 500;
            color: #ff4444;
        }

        .play-icon {
            color: #ff0022;
            font-size: 14px;
            flex-shrink: 0;
        }

        .playing-badge-text {
            font-size: 9px;
            background: #ff0022;
            color: #fff;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .loading-text {
            grid-column: span 2;
            text-align: center;
            padding: 20px;
            color: #888;
        }

        .no-results-msg {
            grid-column: span 2;
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 14px;
            display: none;
        }

        .app-footer {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #161a22;
            padding-top: 15px;
            color: #666;
            font-size: 12px;
            margin-top: 10px;
        }

        /* MOBILE SCREEN RE-FIT */
        @media screen and (max-width: 768px) {
            .sidebar {
                width: 75px; 
                padding: 15px 4px 10px 4px;
            }
            
            .logo-section h1 {
                font-size: 10px;
                text-align: center;
                line-height: 1.2;
                margin-bottom: 15px;
            }
            .logo-section h1 span { display: block; }

            .nav-menu { gap: 2px; }

            .nav-item {
                flex-direction: column;
                gap: 3px;
                padding: 8px 2px;
                font-size: 8px;
                text-align: center;
            }
            .nav-item i { width: auto; font-size: 14px; }

            .social-links { gap: 8px; padding-top: 10px; }
            .social-links a { font-size: 13px; }

            .main-content {
                margin-left: 75px;
                width: calc(100% - 75px);
                padding: 12px;
            }

            .time-widget { font-size: 13px; }
            .time-widget span { font-size: 10px; }

            .cat-header h3 { font-size: 15px; }
            .search-box { width: 140px; } 

            .channels-grid { gap: 8px; }
            .channel-card { padding: 8px; gap: 8px; }
            .channel-thumb { width: 42px; height: 32px; font-size: 12px; }
            .channel-info h4 { font-size: 11px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <div class="logo-section">
                <h1>SA IPTV <br><span>BD LIVE</span></h1>
            </div>
            
            <!-- সাইডবার মেনু এখন ডাইনামিকালি লোড হবে -->
            <nav class="nav-menu" id="sidebar-menu">
                <div class="loading-text" style="font-size: 11px;">Loading Menu...</div>
            </nav>

            <div class="social-links">
                <a href="https://www.facebook.com/ahmed.bd.fb" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://telegram.org" target="_blank"><i class="fa-brands fa-telegram"></i></a>
                <a href="https://youtube.com" target="_blank"><i class="fa-brands fa-youtube"></i></a>
            </div>
        </aside>

        <main class="main-content">
            
            <header class="top-header">
                <div class="time-widget">
                    <i class="fa-regular fa-clock" style="color: #ff0022; margin-right: 5px;"></i> <span id="clock">--:-- --</span><br>
                    <span id="date">Loading...</span>
                </div>
            </header>

            <section class="player-container">
                <div class="video-wrapper">
                    <div class="player-overlay-top" id="player-badge-overlay">
                        <span class="score-badge"><span class="live-dot"></span> PLAYING: <span id="current-channel-title">Loading Playlist...</span></span>
                    </div>
                    <video id="video" controls autoplay playsinline></video>
                </div>
            </section>

            <div class="scrollable-content-area">
                
                <section class="category-section">
                    <div class="cat-header">
                        <h3>Categories</h3>
                        <div class="search-box">
                            <input type="text" id="search" placeholder="Search..." oninput="handleSearchInput()">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                    </div>
                    
                    <!-- ওপরে স্ক্রল করার বাটনগুলো ডাইনামিকালি তৈরি হবে -->
                    <div class="category-tags" id="category-buttons-container">
                        <div class="loading-text" style="font-size: 11px; padding:0;">Loading Categories...</div>
                    </div>
                </section>

                <section class="channels-grid" id="channels-container">
                    <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading channels...</div>
                </section>
                <div id="no-results" class="no-results-msg">No channels found matching the criteria.</div>

                <footer class="app-footer">
                    <p>© 2026 SA IPTV BD LIVE</p>
                    <p>Built with <span style="color: red;">&hearts;</span></p>
                </footer>
                
            </div>

        </main>
    </div>

    <script>
        let currentSelectedCategory = "ALL"; 
        let badgeTimeout = null;
        let currentPlayingUrl = ""; 
        let allChannels = [];
        let uniqueCategories = new Set(); // M3U থেকে ইউনিক ক্যাটাগরি রাখার জন্য

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerHTML = hours + ':' + minutes + ' ' + ampm;
            document.getElementById('date').innerHTML = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const m3uUrl = "https://raw.githubusercontent.com/ahmedstore75/StreamBangla/refs/heads/main/BDIX-Playlist.m3u";

        async function loadM3UPlaylist() {
            try {
                const response = await fetch(m3uUrl);
                if (!response.ok) throw new Error("Network Issue");
                const m3uText = await response.text();
                parseM3U(m3uText);
            } catch (error) {
                document.getElementById('channels-container').innerHTML = `<div class="loading-text" style="color: #ff0022;">Failed to load M3U playlist.</div>`;
            }
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            let currentName = "";
            let currentLogo = "";
            let currentGroup = "Uncategorized"; 

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : "";

                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1].trim() : "Uncategorized";

                    const nameIndex = line.lastIndexOf(',');
                    if (nameIndex !== -1) {
                        currentName = line.substring(nameIndex + 1).trim();
                    }
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        allChannels.push({
                            name: currentName,
                            url: line,
                            logo: currentLogo,
                            group: currentGroup
                        });
                        
                        // ক্যাটাগরির নাম সেট-এ যুক্ত করা হচ্ছে
                        if(currentGroup && currentGroup.toLowerCase() !== "all") {
                            uniqueCategories.add(currentGroup);
                        }

                        currentName = ""; 
                        currentLogo = "";
                        currentGroup = "Uncategorized";
                    }
                }
            }
            
            buildDynamicCategoryUI(); // প্রথমে ক্যাটাগরি মেনু তৈরি হবে
            buildInitialDOMChannels(); 

            if (allChannels.length > 0 && currentPlayingUrl === "") {
                playLiveStream(allChannels[0].url, allChannels[0].name);
            }
        }

        // M3U থেকে পাওয়া গ্রুপ অনুযায়ী বাটন এবং সাইডবার মেনু জেনারেট করা
        function buildDynamicCategoryUI() {
            const sidebarMenu = document.getElementById('sidebar-menu');
            const tagsContainer = document.getElementById('category-buttons-container');

            // রিসেট করা
            sidebarMenu.innerHTML = `<a onclick="syncCategory('ALL', this)" class="nav-item active" data-cat="ALL"><i class="fa-solid fa-border-all"></i> ALL CHANNELS</a>`;
            tagsContainer.innerHTML = `<button class="cat-btn active" data-cat="ALL" onclick="syncCategory('ALL', this)">ALL</button>`;

            // ইউনিক ক্যাটাগরি লুপ চালিয়ে বাটন তৈরি
            uniqueCategories.forEach(cat => {
                // সাইডবার মেনুর জন্য
                const navItem = document.createElement('a');
                navItem.className = 'nav-item';
                navItem.setAttribute('data-cat', cat);
                navItem.onclick = function() { syncCategory(cat, this); };
                navItem.innerHTML = `<i class="fa-solid fa-tv"></i> ${cat.toUpperCase()}`;
                sidebarMenu.appendChild(navItem);

                // টপ স্টিকি বারের বাটন এর জন্য
                const catBtn = document.createElement('button');
                catBtn.className = 'cat-btn';
                catBtn.setAttribute('data-cat', cat);
                catBtn.onclick = function() { syncCategory(cat, this); };
                catBtn.innerText = cat;
                tagsContainer.appendChild(catBtn);
            });
        }

        function buildInitialDOMChannels() {
            const container = document.getElementById('channels-container');
            container.innerHTML = "";

            allChannels.forEach((channel, index) => {
                const serialNum = String(index + 1).padStart(2, '0');
                const card = document.createElement('div');
                
                card.className = 'channel-card';
                card.setAttribute('data-url', channel.url);
                card.setAttribute('data-name', channel.name.toLowerCase());
                card.setAttribute('data-group', channel.group.toLowerCase());
                
                card.onclick = () => playLiveStream(channel.url, channel.name);

                const logoHtml = channel.logo ? `<img src="${channel.logo}" alt="" class="channel-thumb">` : `<div class="channel-thumb"><i class="fa-solid fa-tv"></i></div>`;
                
                card.innerHTML = `
                    ${logoHtml}
                    <div class="channel-info">
                        <h4>${serialNum} | ${channel.name}</h4>
                        <p class="cat-name">${channel.group}</p>
                    </div>
                    <div class="status-box"><i class="fa-solid fa-play play-icon"></i></div>
                `;
                container.appendChild(card);
            });
            
            filterChannels();
        }

        function handleSearchInput() {
            filterChannels();
        }

        function syncCategory(categoryName, element) {
            document.getElementById('search').value = "";
            currentSelectedCategory = categoryName;
            updateCategoryActiveUI(categoryName);
            filterChannels(); 
        }

        function updateCategoryActiveUI(categoryName) {
            const menuItems = document.querySelectorAll('.nav-item');
            menuItems.forEach(item => item.classList.remove('active'));
            const matchedMenu = Array.from(menuItems).find(item => item.getAttribute('data-cat').toLowerCase() === categoryName.toLowerCase());
            if(matchedMenu) matchedMenu.classList.add('active');

            const catButtons = document.querySelectorAll('.cat-btn');
            catButtons.forEach(btn => btn.classList.remove('active'));
            const matchedBtn = Array.from(catButtons).find(btn => btn.getAttribute('data-cat').toLowerCase() === categoryName.toLowerCase());
            if(matchedBtn) matchedBtn.classList.add('active');
        }

        function filterChannels() {
            const searchQuery = document.getElementById('search').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.channel-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const cardName = card.getAttribute('data-name');
                const cardGroup = card.getAttribute('data-group');
                
                const matchesSearch = cardName.includes(searchQuery);
                let matchesCategory = false;

                if (currentSelectedCategory === "ALL") {
                    matchesCategory = true;
                } else {
                    matchesCategory = (cardGroup === currentSelectedCategory.toLowerCase());
                }

                if (matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            const noResults = document.getElementById('no-results');
            if (visibleCount === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        }

        const video = document.getElementById('video');
        let hlsPlayer = null;

        const aggressiveBufferConfig = {
            enableWorker: true,
            maxBufferLength: 90,                 
            maxMaxBufferLength: 120,             
            maxBufferSize: 150 * 1024 * 1024,    
            liveSyncDuration: 10.0,              
            liveMaxLatencyDuration: 20.0,        
            progressive: true,                   
            backBufferLength: 30                 
        };

        function playLiveStream(url, name) {
            if (currentPlayingUrl === url && hlsPlayer) {
                return; 
            }

            currentPlayingUrl = url; 

            const badgeOverlay = document.getElementById('player-badge-overlay');
            document.getElementById('current-channel-title').innerText = name;

            badgeOverlay.style.opacity = "1";
            if (badgeTimeout) clearTimeout(badgeTimeout);
            badgeTimeout = setTimeout(() => { badgeOverlay.style.opacity = "0"; }, 3000);

            video.muted = false;
            video.volume = 1.0;

            if (hlsPlayer) hlsPlayer.destroy();

            if (Hls.isSupported()) {
                hlsPlayer = new Hls(aggressiveBufferConfig);
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => { console.log("Autoplay prevented."); });
                });

                hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hlsPlayer.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsPlayer.recoverMediaError();
                                break;
                            default:
                                playLiveStream(url, name);
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }

            updatePlayingCardUI();
        }

        function updatePlayingCardUI() {
            const cards = document.querySelectorAll('.channel-card');
            cards.forEach(card => {
                const cardUrl = card.getAttribute('data-url');
                const statusBox = card.querySelector('.status-box');
                
                if (cardUrl === currentPlayingUrl) {
                    card.classList.add('currently-playing');
                    if(statusBox) statusBox.innerHTML = `<span class="playing-badge-text">LIVE</span>`;
                } else {
                    card.classList.remove('currently-playing');
                    if(statusBox) statusBox.innerHTML = `<i class="fa-solid fa-play play-icon"></i>`;
                }
            });
        }

        window.onload = loadM3UPlaylist;
    </script>
</body>
</html>
