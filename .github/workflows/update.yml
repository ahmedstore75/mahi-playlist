name: Auto Merge IPTV

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Sources
        run: |
          curl -L "https://raw.githubusercontent.com/ahmedstore75/Iptvbdlive/main/mixiptvchannel.m3u" -o one.m3u

          curl -L "https://raw.githubusercontent.com/ahan443/FAST-IPTV/refs/heads/main/combined_playlist.m3u" -o two.m3u

          curl -L "https://raw.githubusercontent.com/abusaeeidx/Mrgify-BDIX-IPTV/main/playlist.m3u" -o three.m3u
          
          curl -L "https://raw.githubusercontent.com/sm-monirulislam/SM-Live-TV/refs/heads/main/Combined_Live_TV.m3u" -o four.m3u

      - name: Merge
        run: |
          cat one.m3u two.m3u three.m3u four.m3u > BDIX-Playlist.m3u

      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add BDIX-Playlist.m3u
          git commit -m "Auto merge playlists" || exit 0
          git push
