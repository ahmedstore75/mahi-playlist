<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA IPTV BD LIVE</title>
    <link class="cdn-link" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        /* মেইন গ্লোবাল রুলস */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            overflow: hidden; /* পুরো বডির মেইন স্ক্রল বন্ধ */
        }

        /* কন্টেইনার সজ্জা */
        .main-content {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh; 
        }

        /* টপ হেডার */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #161a22;
            flex-shrink: 0;
        }

        .logo-section h1 {
            font-size: 20px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .logo-section h1 span {
            color: #ff0022;
        }

        .time-widget {
            text-align: right;
            font-size: 15px;
            color: #ffffff;
            font-weight: bold;
            line-height: 1.2;
        }
        .time-widget span {
            font-size: 12px;
            color: #888;
        }

        /* লেআউট বডি */
        .content-body {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
            overflow: hidden; 
        }

        /* ভিডিও প্লেয়ার কন্টেইনার */
        .player-container {
            width: 100%;
            flex-shrink: 0;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2a2f3b;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-overlay-top {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }

        .score-badge {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #ff0022;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #ff0022;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* চ্যানেল ও ক্যাটাগরি এরিয়া */
        .list-container-area {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden; 
        }

        /* ক্যাটাগরি সেকশন */
        .category-section {
            background-color: #0b0e14;
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        .cat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 15px;
        }

        /* গর্জিয়াস সার্চ বক্স ডিজাইন */
        .search-box {
            position: relative;
            width: 200px;
        }
        .search-box input {
            width: 100%;
            background: linear-gradient(145deg, #161a22, #1a202c);
            border: 1px solid #3a4454;
            padding: 8px 35px 8px 12px;
            border-radius: 8px;
            color: #fff;
            outline: none;
            font-size: 13px;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .search-box input:focus {
            border-color: #ff0022;
            box-shadow: 0 0 10px rgba(255, 0, 34, 0.4), inset 0 1px 2px rgba(0,0,0,0.2);
            background: #1c212d;
        }
        .search-box i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff0022;
            font-size: 13px;
            transition: all 0.3s ease;
        }
        .search-box input:focus + i {
            color: #fff;
            text-shadow: 0 0 5px #ff0022;
        }

        /* টাচপ্যাডের জন্য আল্ট্রা-স্মুথ ক্যাটাগরি প্যানেল */
        .category-tags {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 6px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* মোবাইল ও ম্যাক টাচপ্যাড মোমেন্টাম জেসচার */
            scrollbar-width: thin;
        }
        .category-tags::-webkit-scrollbar { height: 4px; }
        .category-tags::-webkit-scrollbar-thumb { background: #2a2f3b; border-radius: 2px; }

        .cat-btn {
            background-color: #161a22;
            color: #b3b3b3;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            user-select: none;
        }
        .cat-btn.active, .cat-btn:hover {
            background-color: #ff0022;
            color: #fff;
        }

        /* স্ক্রলেবল চ্যানেল ভিউ */
        .channels-scroll-view {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        .channels-scroll-view::-webkit-scrollbar { width: 5px; }
        .channels-scroll-view::-webkit-scrollbar-thumb { background: #ff0022; border-radius: 3px; }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            padding-bottom: 15px;
        }

        .channel-card {
            background-color: #161a22;
            border: 1px solid #2a2f3b;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            overflow: hidden;
        }
        .channel-card:hover {
            background-color: #1e2330;
            border-color: #ff0022;
        }
        .channel-card.currently-playing {
            border-color: #ff0022;
            background-color: #1e1115;
        }

        .channel-thumb {
            width: 45px;
            height: 35px;
            object-fit: contain;
            background-color: #0b0e14;
            border-radius: 4px;
            border: 1px solid #2a2f3b;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff0022;
        }

        .channel-info {
            flex-grow: 1;
            overflow: hidden;
        }
        .channel-info h4 {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .cat-name {
            font-size: 11px;
            color: #ff4444;
            margin-top: 2px;
        }

        .play-icon {
            color: #ff0022;
            font-size: 12px;
        }
        .playing-badge-text {
            font-size: 9px;
            background: #ff0022;
            color: #fff;
            padding: 2px 5px;
            border-radius: 3px;
            font-weight: bold;
        }

        .loading-text {
            grid-column: span 2;
            text-align: center;
            padding: 20px;
            color: #888;
        }
        .no-results-msg {
            grid-column: span 2;
            text-align: center;
            padding: 25px;
            color: #666;
            font-size: 14px;
            display: none;
        }

        /* ফুটার */
        .app-footer {
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid #161a22;
            padding-top: 10px;
            color: #666;
            font-size: 11px;
            flex-shrink: 0;
            text-align: center;
        }

        /* ===================================================
           LAPTOP & DESKTOP SCREEN FIXED LAYOUT 
           =================================================== */
        @media screen and (min-width: 992px) {
            .content-body {
                flex-direction: row;
                align-items: stretch;
            }

            .player-container {
                width: 60%;
            }

            .list-container-area {
                width: 40%;
            }

            .channels-grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }

        /* মোবাইল স্ক্রিন ল্যান্ডস্কেপ (রোটেট) ফুলস্ক্রিন রুলস */
        @media screen and (max-width: 932px) and (orientation: landscape) {
            body, .main-content {
                margin: 0 !important;
                padding: 0 !important;
                width: 100vw !important;
                height: 100vh !important;
                overflow: hidden !important;
            }
            .top-header, .list-container-area, .app-footer {
                display: none !important;
            }
            .content-body, .player-container, .video-wrapper {
                width: 100vw !important;
                height: 100vh !important;
                margin: 0 !important;
                border: none !important;
                border-radius: 0 !important;
                aspect-ratio: auto !important;
            }
            video {
                width: 100% !important;
                height: 100% !important;
                object-fit: fill !important; 
            }
        }
    </style>
</head>
<body>

    <div class="main-content">
        
        <header class="top-header">
            <div class="logo-section">
                <h1>SA IPTV <span>BD LIVE</span></h1>
            </div>
            <div class="time-widget">
                <i class="fa-regular fa-clock" style="color: #ff0022; margin-right: 5px;"></i> <span id="clock">--:-- --</span><br>
                <span id="date">Loading...</span>
            </div>
        </header>

        <div class="content-body">
            
            <section class="player-container">
                <div class="video-wrapper">
                    <div class="player-overlay-top" id="player-badge-overlay">
                        <span class="score-badge"><span class="live-dot"></span> PLAYING: <span id="current-channel-title">Loading Playlist...</span></span>
                    </div>
                    <video id="video" controls autoplay playsinline></video>
                </div>
            </section>

            <div class="list-container-area">
                
                <section class="category-section">
                    <div class="cat-header">
                        <h3>Categories</h3>
                        <div class="search-box">
                            <input type="text" id="search" placeholder="Search channels..." oninput="handleSearchInput()">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </div>
                    </div>
                    <div class="category-tags" id="category-buttons-container">
                        <div class="loading-text" style="font-size: 11px; padding:0;">Loading Categories...</div>
                    </div>
                </section>

                <div class="channels-scroll-view">
                    <section class="channels-grid" id="channels-container">
                        <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading channels...</div>
                    </section>
                    <div id="no-results" class="no-results-msg">No channels found.</div>
                </div>
                
            </div>

        </div>

        <footer class="app-footer">
            <p>© 2026 SA IPTV BD LIVE</p>
        </footer>
        
    </div>

    <script>
        let currentSelectedCategory = "ALL"; 
        let lastUserSelectedCategory = "ALL"; 
        let badgeTimeout = null;
        let currentPlayingUrl = ""; 
        let allChannels = [];
        let uniqueCategories = new Set(); 

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerHTML = hours + ':' + minutes + ' ' + ampm;
            document.getElementById('date').innerHTML = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        const m3uUrl = "https://raw.githubusercontent.com/ahmedstore75/StreamBangla/refs/heads/main/BDIX-Playlist.m3u";

        async function loadM3UPlaylist() {
            try {
                const response = await fetch(m3uUrl);
                if (!response.ok) throw new Error("Network Issue");
                const m3uText = await response.text();
                parseM3U(m3uText);
            } catch (error) {
                document.getElementById('channels-container').innerHTML = `<div class="loading-text" style="color: #ff0022;">Failed to load M3U playlist.</div>`;
            }
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            let currentName = "";
            let currentLogo = "";
            let currentGroup = "Uncategorized"; 

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (line.startsWith('#EXTINF:')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentLogo = logoMatch ? logoMatch[1] : "";

                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    currentGroup = groupMatch ? groupMatch[1].trim() : "Uncategorized";

                    const nameIndex = line.lastIndexOf(',');
                    if (nameIndex !== -1) {
                        currentName = line.substring(nameIndex + 1).trim();
                    }
                } else if (line.startsWith('http')) {
                    if (currentName) {
                        allChannels.push({
                            name: currentName,
                            url: line,
                            logo: currentLogo,
                            group: currentGroup
                        });
                        
                        if(currentGroup && currentGroup.toLowerCase() !== "all") {
                            uniqueCategories.add(currentGroup);
                        }

                        currentName = ""; 
                        currentLogo = "";
                        currentGroup = "Uncategorized";
                    }
                }
            }
            
            buildDynamicCategoryUI(); 
            buildInitialDOMChannels(); 
            enableAdvancedSmoothScroll(); // আল্ট্রা-স্মুথ স্ক্রলিং ইঞ্জিন রান করা হলো

            if (allChannels.length > 0 && currentPlayingUrl === "") {
                playLiveStream(allChannels[0].url, allChannels[0].name);
            }
        }

        function buildDynamicCategoryUI() {
            const tagsContainer = document.getElementById('category-buttons-container');
            tagsContainer.innerHTML = `<button class="cat-btn active" data-cat="ALL" onclick="syncCategory('ALL', this)">ALL</button>`;

            uniqueCategories.forEach(cat => {
                const catBtn = document.createElement('button');
                catBtn.className = 'cat-btn';
                catBtn.setAttribute('data-cat', cat);
                catBtn.onclick = function() { syncCategory(cat, this); };
                catBtn.innerText = cat;
                tagsContainer.appendChild(catBtn);
            });
        }

        // টাচপ্যাড এবং মাউস হুইল দুইটার জন্যই আল্ট্রা-স্মুথ মোমেন্টাম স্ক্রলিং ইঞ্জিন
        function enableAdvancedSmoothScroll() {
            const el = document.getElementById('category-buttons-container');
            if (!el) return;

            let targetScrollLeft = el.scrollLeft;
            let currentScrollLeft = el.scrollLeft;
            let isAnimating = false;

            // মাউস হুইল ইন্টারসেপ্টর
            el.addEventListener('wheel', (e) => {
                // যদি ব্যবহারকারী টাচপ্যাডে ট্রু হরাইজন্টাল সোয়াইপ করে (deltaX থ্রেশহোল্ড), জাভাস্ক্রিপ্ট ইন্টারফেয়ার করবে না
                if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
                    return; 
                }

                e.preventDefault(); // মাউস হুইলের কর্কশ ভার্টিকাল স্ক্রল থামাবে
                
                // স্মুথ টার্গেট ক্যালকুলেশন
                targetScrollLeft += e.deltaY * 0.8; 
                targetScrollLeft = Math.max(0, Math.min(targetScrollLeft, el.scrollWidth - el.clientWidth));

                if (!isAnimating) {
                    isAnimating = true;
                    smoothAnimationLoop();
                }
            }, { passive: false });

            // requestAnimationFrame দিয়ে লিনিয়ার ইন্টারপোলেশন (LERP) মোমেন্টাম তৈরি
            function smoothAnimationLoop() {
                const diff = targetScrollLeft - currentScrollLeft;
                
                // প্রতি ফ্রেমে ১২% করে টার্গেটের দিকে এগিয়ে যাবে (মাখনের মতো মসৃণ ফিল দেবে)
                currentScrollLeft += diff * 0.12; 
                el.scrollLeft = currentScrollLeft;

                if (Math.abs(diff) > 0.5) {
                    requestAnimationFrame(smoothAnimationLoop);
                } else {
                    currentScrollLeft = targetScrollLeft;
                    el.scrollLeft = targetScrollLeft;
                    isAnimating = false;
                }
            }

            // টাচপ্যাড বা মোবাইলে ম্যানুয়াল ড্রাগ করার সময় টার্গেট আপডেট রাখা
            el.addEventListener('scroll', () => {
                if (!isAnimating) {
                    targetScrollLeft = el.scrollLeft;
                    currentScrollLeft = el.scrollLeft;
                }
            });
        }

        function buildInitialDOMChannels() {
            const container = document.getElementById('channels-container');
            container.innerHTML = "";

            allChannels.forEach((channel, index) => {
                const card = document.createElement('div');
                
                card.className = 'channel-card';
                card.setAttribute('data-url', channel.url);
                card.setAttribute('data-name', channel.name.toLowerCase());
                card.setAttribute('data-group', channel.group.toLowerCase());
                
                card.onclick = () => playLiveStream(channel.url, channel.name);

                const logoHtml = channel.logo ? `<img src="${channel.logo}" alt="" class="channel-thumb">` : `<div class="channel-thumb"><i class="fa-solid fa-tv"></i></div>`;
                
                card.innerHTML = `
                    ${logoHtml}
                    <div class="channel-info">
                        <h4>${channel.name}</h4>
                        <p class="cat-name">${channel.group}</p>
                    </div>
                    <div class="status-box"><i class="fa-solid fa-play play-icon"></i></div>
                `;
                container.appendChild(card);
            });
            
            filterChannels();
        }

        function handleSearchInput() {
            const searchQuery = document.getElementById('search').value.trim();
            
            if (searchQuery.length > 0) {
                currentSelectedCategory = "ALL";
                updateCategoryActiveUI("ALL");
            } else {
                currentSelectedCategory = lastUserSelectedCategory;
                updateCategoryActiveUI(lastUserSelectedCategory);
            }
            filterChannels();
        }

        function syncCategory(categoryName, element) {
            document.getElementById('search').value = ""; 
            currentSelectedCategory = categoryName;
            lastUserSelectedCategory = categoryName; 
            updateCategoryActiveUI(categoryName);
            filterChannels(); 
        }

        function updateCategoryActiveUI(categoryName) {
            const catButtons = document.querySelectorAll('.cat-btn');
            catButtons.forEach(btn => btn.classList.remove('active'));
            const matchedBtn = Array.from(catButtons).find(btn => btn.getAttribute('data-cat').toLowerCase() === categoryName.toLowerCase());
            if(matchedBtn) matchedBtn.classList.add('active');
        }

        function filterChannels() {
            const searchQuery = document.getElementById('search').value.toLowerCase().trim();
            const cards = document.querySelectorAll('.channel-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const cardName = card.getAttribute('data-name');
                const cardGroup = card.getAttribute('data-group');
                
                const matchesSearch = cardName.includes(searchQuery);
                let matchesCategory = false;

                if (currentSelectedCategory === "ALL") {
                    matchesCategory = true;
                } else {
                    matchesCategory = (cardGroup === currentSelectedCategory.toLowerCase());
                }

                if (matchesSearch && matchesCategory) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });

            const noResults = document.getElementById('no-results');
            if (visibleCount === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
            }
        }

        const video = document.getElementById('video');
        let hlsPlayer = null;

        const aggressiveBufferConfig = {
            enableWorker: true,
            maxBufferLength: 90,                 
            maxMaxBufferLength: 120,             
            maxBufferSize: 150 * 1024 * 1024,    
            liveSyncDuration: 10.0,              
            liveMaxLatencyDuration: 20.0,        
            progressive: true,                   
            backBufferLength: 30                 
        };

        function playLiveStream(url, name) {
            if (currentPlayingUrl === url && hlsPlayer) return; 

            currentPlayingUrl = url; 
            const badgeOverlay = document.getElementById('player-badge-overlay');
            document.getElementById('current-channel-title').innerText = name;

            badgeOverlay.style.opacity = "1";
            if (badgeTimeout) clearTimeout(badgeTimeout);
            badgeTimeout = setTimeout(() => { badgeOverlay.style.opacity = "0"; }, 3000);

            if (hlsPlayer) hlsPlayer.destroy();

            if (Hls.isSupported()) {
                hlsPlayer = new Hls(aggressiveBufferConfig);
                hlsPlayer.loadSource(url);
                hlsPlayer.attachMedia(video);
                
                hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(() => {});
                });

                hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hlsPlayer.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hlsPlayer.recoverMediaError();
                                break;
                            default:
                                playLiveStream(url, name);
                                break;
                        }
                    }
                });

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            }
            updatePlayingCardUI();
        }

        function updatePlayingCardUI() {
            const cards = document.querySelectorAll('.channel-card');
            cards.forEach(card => {
                const cardUrl = card.getAttribute('data-url');
                const statusBox = card.querySelector('.status-box');
                
                if (cardUrl === currentPlayingUrl) {
                    card.classList.add('currently-playing');
                    if(statusBox) statusBox.innerHTML = `<span class="playing-badge-text">LIVE</span>`;
                } else {
                    card.classList.remove('currently-playing');
                    if(statusBox) statusBox.innerHTML = `<i class="fa-solid fa-play play-icon"></i>`;
                }
            });
        }

        window.onload = loadM3UPlaylist;
    </script>
</body>
</html>
